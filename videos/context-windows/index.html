<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      }
      .clip { position: absolute; opacity: 0; }
      #title {
        font-size: 56px;
        font-weight: 900;
        color: #fff;
        text-align: center;
        position: absolute;
        top: 80px;
        left: 50%;
        transform: translateX(-50%);
        text-transform: uppercase;
        letter-spacing: 4px;
      }
      #subtitle {
        font-size: 22px;
        color: #a0aec0;
        text-align: center;
        position: absolute;
        top: 150px;
        left: 50%;
        transform: translateX(-50%);
      }
      .layer {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        padding: 16px 24px;
        border-radius: 12px;
        font-size: 18px;
        font-weight: 600;
        color: #fff;
      }
      #layer1 {
        top: 220px;
        background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
        min-width: 500px;
      }
      #layer2 {
        top: 340px;
        background: rgba(30, 30, 50, 0.95);
        border: 2px solid #6366f1;
        min-width: 600px;
      }
      #layer3 {
        top: 460px;
        background: rgba(30, 30, 50, 0.95);
        border: 2px solid #22c55e;
        min-width: 550px;
      }
      #layer4 {
        top: 580px;
        background: rgba(30, 30, 50, 0.95);
        border: 2px solid #f59e0b;
        min-width: 500px;
      }
      .layer-size {
        font-size: 14px;
        color: #a0aec0;
        margin-top: 4px;
      }
      .tip-box {
        position: absolute;
        padding: 16px 24px;
        background: rgba(245, 158, 11, 0.15);
        border-left: 4px solid #f59e0b;
        border-radius: 0 12px 12px 0;
        font-size: 18px;
        color: #fff;
        max-width: 600px;
      }
      .key-term { color: #f59e0b; font-weight: 700; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="20" data-width="1920" data-height="1080">
      <div id="title" class="clip" data-start="0" data-duration="4" data-track-index="0">CONTEXT WINDOWS</div>
      <div id="subtitle" class="clip" data-start="0.5" data-duration="3.5" data-track-index="1">Managing Token Limits</div>

      <div id="layer1" class="clip layer" data-start="4" data-duration="4" data-track-index="0">
        System Prompt
        <div class="layer-size">~2,000 tokens</div>
      </div>
      <div id="layer2" class="clip layer" data-start="4.5" data-duration="3.5" data-track-index="0">
        Messages (Conversation History)
        <div class="layer-size">Up to 200,000 tokens</div>
      </div>
      <div id="layer3" class="clip layer" data-start="5" data-duration="3" data-track-index="0">
        Tool Definitions
        <div class="layer-size">~3,000 tokens</div>
      </div>
      <div id="layer4" class="clip layer" data-start="5.5" data-duration="2.5" data-track-index="0">
        Tool Results
        <div class="layer-size">Variable</div>
      </div>

      <div id="tip1" class="clip tip-box" data-start="9" data-duration="4" data-track-index="0">
        <span class="key-term">Progressive Summarization:</span> Compress old messages
      </div>
      <div id="tip2" class="clip tip-box" data-start="13" data-duration="4" data-track-index="0">
        <span class="key-term">Fact Extraction:</span> Preserve critical data
      </div>
      <div id="tip3" class="clip tip-box" data-start="17" data-duration="3" data-track-index="0">
        <span class="key-term">Subagents:</span> Delegate verbose tasks
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.from("#title", { opacity: 0, scale: 0.8, duration: 1 }, 0)
        .from("#subtitle", { opacity: 0, y: 20, duration: 0.8 }, 0.3)
        .from("#layer1", { opacity: 0, y: -50, duration: 0.6 }, 4)
        .from("#layer2", { opacity: 0, y: -50, duration: 0.6 }, 4.5)
        .from("#layer3", { opacity: 0, y: -50, duration: 0.6 }, 5)
        .from("#layer4", { opacity: 0, y: -50, duration: 0.6 }, 5.5)
        .from("#tip1", { opacity: 0, x: -80, duration: 0.6 }, 9)
        .from("#tip2", { opacity: 0, x: 80, duration: 0.6 }, 13)
        .from("#tip3", { opacity: 0, y: 50, duration: 0.6 }, 17);
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
